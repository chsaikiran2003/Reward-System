name: reward_system
description: Flutter Reward System App - Ad Banners & Mini Games

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & networking
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  
  # State management
  provider: ^6.1.1
  
  # Local storage
  shared_preferences: ^2.2.1
  
  # UI
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
